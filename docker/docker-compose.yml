# cyclo_intelligence — Docker Compose
#
# Two services:
#   cyclo_intelligence   main image (PLAN §4.5) — orchestrator +
#                         cyclo_data + UI + nginx + s6-agent. Always
#                         started first.
#   lerobot              policy container (PLAN §4.8) — pulled /
#                         started on demand by the UI via
#                         supervisor_api. May be brought up manually
#                         for Step 4 verification.
#
# Usage: prefer the container.sh wrapper — it auto-detects ARCH from
# `uname -m` and sets the compose env:
#   docker/container.sh start              # → cyclo_intelligence only
#   docker/container.sh start-lerobot      # → lerobot (no ROBOT_TYPE
#                                          #    needed; passed at LOAD)
#   docker/container.sh enter              # → bash inside cyclo_intelligence
#   docker/container.sh logs               # → compose logs -f
#   docker/container.sh stop               # → compose down
#
# Direct compose (ARCH defaults to arm64 since Jetson is the primary
# target):
#   docker compose -f docker/docker-compose.yml up -d --build cyclo_intelligence
#   docker compose -f docker/docker-compose.yml up -d --build lerobot

# Explicit project name. Without this, compose defaults the project to
# the parent dir name ('docker') — same default used by every other
# repo whose compose file sits under <repo>/docker/, including
# other ROBOTIS container suites (zenoh_daemon, ai_worker,
# novnc-server, talos_ui). Sharing the project name means compose
# treats those containers as 'orphans' of our project and
# --remove-orphans wipes them. Pin our own name so down/up only ever
# touches cyclo_intelligence's own containers.
name: cyclo_intelligence

services:
  # ============================================================
  # cyclo_intelligence main container (PLAN §4.5).
  # Multi-stage image (docker/Dockerfile.{arm64,amd64}) carries the
  # UI static assets, the ROS2 workspace (orchestrator + cyclo_data
  # + interfaces + shared), nginx, rosbridge, web_video_server, and
  # the s6-agent / supervisor_api control plane.
  # ============================================================
  cyclo_intelligence:
    container_name: cyclo_intelligence
    image: robotis/cyclo-intelligence:${VERSION:-0.1.1}-${ARCH:-arm64}
    build:
      context: ..
      dockerfile: docker/Dockerfile.${ARCH:-arm64}
      # Tegra (Jetson) 5.15.x kernels ship without iptable_raw, so
      # BuildKit can't create the per-step bridge network. host net
      # during build is functionally identical for our needs and skips
      # the iptables raw-table requirement entirely.
      network: host

    # SYS_NICE + rtprio so orchestrator's control thread can request
    # real-time priority. memlock matches the production runtime value.
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856

    # Host network + IPC so rmw_zenoh on the orchestrator side can
    # reach the policy containers (and anything else on the host).
    network_mode: host
    ipc: host

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-30}
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_ROUTER_IP=127.0.0.1
      - ZENOH_ROUTER_PORT=7447
      - ZENOH_CONFIG_OVERRIDE=transport/shared_memory/enabled=true
      - PYTHONUNBUFFERED=1

    volumes:
      - /dev:/dev
      - /dev/shm:/dev/shm
      - ./workspace:/workspace
      - ./huggingface:/root/.cache/huggingface
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Live-edit the ROS2 workspace at runtime so a 'colcon build'
      # inside the container sees host-side edits. The container copy
      # at build time still lives in the image; this mount shadows it.
      - ..:/root/ros2_ws/src/cyclo_intelligence
      # URDF + mesh assets for the UI's 3D viewer. Source of truth is
      # shared/robot_configs/ (consolidated from the legacy
      # rosbag_recorder/config/ location — URDFs describe the robot,
      # not the recorder, so they belong with the other shared
      # robot-config assets next to parameter_loader.py). nginx serves
      # /urdf/* from /usr/share/nginx/html/urdf/, so these have to be
      # bind-mounted at request time (not baked).
      - ../shared/shared/robot_configs/urdf:/usr/share/nginx/html/urdf/urdf:ro
      - ../shared/shared/robot_configs/ffw_description:/usr/share/nginx/html/urdf/ffw_description:ro
      # supervisor_api manages lerobot / groot lifecycle via Docker SDK
      # (PLAN §4.8). Socket mount makes that possible without DinD.
      - /var/run/docker.sock:/var/run/docker.sock
      # s6-agent UDS — cyclo_manager FastAPI listens here for
      # system-wide control requests from the host side.
      - ${CYCLO_AGENT_SOCKETS_DIR:-/var/run/robotis/agent_sockets/cyclo_intelligence}:/var/run/agent
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

    privileged: true
    restart: unless-stopped
    runtime: nvidia
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "S6_SVSTAT=$$(ls /package/admin/s6-*/command/s6-svstat 2>/dev/null | head -1); [ -n \"$$S6_SVSTAT\" ] && \"$$S6_SVSTAT\" /run/service/main-runtime | grep -q up && \"$$S6_SVSTAT\" /run/service/engine-process | grep -q up",
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  # ============================================================
  # LeRobot two-process policy container.
  # s6-overlay supervises main-runtime and engine-process; Main talks to
  # Engine through an internal Zenoh service and publishes robot commands.
  # Not in depends_on — PLAN §4.8 says lerobot is pulled/started
  # on demand.
  # ============================================================
  lerobot:
    container_name: lerobot_server
    image: robotis/lerobot-zenoh:1.0.0-${ARCH:-arm64}
    build:
      # Build context bumped one level up so the Dockerfile can
      # COPY common/s6-services/ (shared across all policy backends)
      # alongside lerobot/lerobot/. Per-policy Dockerfile path moved
      # under lerobot/.
      context: ../cyclo_brain/policy
      dockerfile: lerobot/Dockerfile.${ARCH:-arm64}
      # See cyclo_intelligence.build.network for why.
      network: host
      args:
        GPU_ARCH: ${GPU_ARCH:-default}

    # Main runtime's control loop tries SCHED_FIFO — let the kernel grant it.
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856

    # Share host network + IPC so rmw_zenoh can reach orchestrator on
    # the same host, and /dev/shm is shared for Zenoh shared-memory
    # transport between the two in-container processes.
    network_mode: host
    ipc: host

    # robot_type is *not* baked here. Main receives it on
    # InferenceCommand.LOAD, then configures its local RobotClient command path.
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-30}
      - ZENOH_ROUTER_IP=127.0.0.1
      - ZENOH_ROUTER_PORT=7447
      - ZENOH_SDK_PATH=/zenoh_sdk
      - ZENOH_CONFIG_OVERRIDE=transport/shared_memory/enabled=true
      - ZENOH_TRANSPORT_SHM_ENABLED=true
      - ZENOH_SHM_ENABLED=true
      - ROBOT_CLIENT_SDK_PATH=/robot_client_sdk
      - ACTION_CHUNK_PROCESSING_SDK_PATH=/action_chunk_processing_sdk
      # Drives Zenoh service prefixes and the default engine module name.
      - POLICY_BACKEND=lerobot
      - POLICY_ENGINE_MODULE=lerobot_engine
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - PYTHONUNBUFFERED=1

    volumes:
      - /dev:/dev
      - /dev/shm:/dev/shm
      - ./workspace:/workspace
      # User-visible policy checkpoint dropbox. Put local LeRobot models under
      # cyclo_brain/policy/lerobot/checkpoints/ on the host, then LOAD them
      # from /policy_checkpoints/lerobot/<model-or-checkpoint> in the container.
      - ../cyclo_brain/policy/lerobot/checkpoints:/policy_checkpoints/lerobot:rw
      - ./huggingface:/root/.cache/huggingface
      # Live-edit SDKs (mounted read-only so the container can't mutate
      # the host tree accidentally).
      - ../cyclo_brain/sdk/zenoh_ros2_sdk:/zenoh_sdk:ro
      - ../cyclo_brain/sdk/robot_client:/robot_client_sdk:ro
      - ../cyclo_brain/sdk/action_chunk_processing:/action_chunk_processing_sdk:ro
      # Common policy runtime (main-runtime + engine-process + Engine ABC).
      - ../cyclo_brain/policy/common/runtime:/policy_runtime:ro
      # Live-edit app-level s6 services while keeping s6-overlay's built-in
      # bundles from the image intact.
      - ../cyclo_brain/policy/common/s6-services/main-runtime:/etc/s6-overlay/s6-rc.d/main-runtime:ro
      - ../cyclo_brain/policy/common/s6-services/engine-process:/etc/s6-overlay/s6-rc.d/engine-process:ro
      - ../cyclo_brain/policy/common/s6-services/user/contents.d:/etc/s6-overlay/s6-rc.d/user/contents.d:ro
      # Per-policy engine — implements InferenceEngine (load_policy +
      # get_action_chunk + cleanup). The only directory unique to this
      # backend; bind-mounted so we can iterate on inference logic
      # without rebuilding the image. The package's __init__.py
      # re-exports LeRobotEngine + create_engine, so Engine process
      # ``importlib.import_module("lerobot_engine")`` keeps resolving
      # the same way it did when this was a single file.
      - ../cyclo_brain/policy/lerobot/lerobot_engine:/app/lerobot_engine:ro
      # zenoh_ros2_sdk message-definition cache. Host-managed (see
      # docker/scripts/init_zenoh_cache.sh) so the in-container SDK
      # doesn't have to git-fetch the upstream `master` branch (gone)
      # and so docker-cp ownership games go away. Two containers share
      # one cache.
      - ./zenoh_cache:/root/.cache/zenoh_ros2_sdk:rw
      # orchestrator keeps the canonical command_topic_list / joint_order
      # YAML. Main runtime's RobotClient reads it on LOAD.
      # Per-robot YAMLs moved to shared/robot_configs/ (consolidated with
      # URDF + meshes under one robot-description tree). The mount destination
      # /orchestrator_config stays because RobotClient reads robot configs
      # from that mount.
      - ../shared/shared/robot_configs:/orchestrator_config:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

    restart: unless-stopped
    runtime: nvidia
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "S6_SVSTAT=$$(ls /package/admin/s6-*/command/s6-svstat 2>/dev/null | head -1); [ -n \"$$S6_SVSTAT\" ] && \"$$S6_SVSTAT\" /run/service/main-runtime | grep -q up && \"$$S6_SVSTAT\" /run/service/engine-process | grep -q up",
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  # ============================================================
  # GR00T N1.6 two-process policy container.
  # Mirrors lerobot's s6-overlay layout (main-runtime + engine-process).
  # Pulled / started on demand by the UI
  # via supervisor_api (PLAN §4.8).
  # ============================================================
  groot:
    container_name: groot_server
    image: robotis/groot-zenoh:1.1.0-${ARCH:-arm64}
    build:
      context: ../cyclo_brain/policy/groot
      dockerfile: Dockerfile.${ARCH:-arm64}
      # See cyclo_intelligence.build.network for why.
      network: host
      args:
        GPU_ARCH: ${GPU_ARCH:-default}

    # Main runtime's control loop tries SCHED_FIFO — let the kernel grant it.
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856

    # Share host network + IPC so rmw_zenoh can reach orchestrator on
    # the same host, and /dev/shm is shared for Zenoh shared-memory
    # transport between the two in-container processes.
    network_mode: host
    ipc: host

    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-30}
      - ZENOH_ROUTER_IP=127.0.0.1
      - ZENOH_ROUTER_PORT=7447
      - ZENOH_SDK_PATH=/zenoh_sdk
      - ZENOH_CONFIG_OVERRIDE=transport/shared_memory/enabled=true
      - ZENOH_TRANSPORT_SHM_ENABLED=true
      - ZENOH_SHM_ENABLED=true
      - ROBOT_CLIENT_SDK_PATH=/robot_client_sdk
      - ACTION_CHUNK_PROCESSING_SDK_PATH=/action_chunk_processing_sdk
      - POLICY_BACKEND=groot
      - POLICY_ENGINE_MODULE=groot_engine
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - PYTHONUNBUFFERED=1

    volumes:
      - /dev:/dev
      - /dev/shm:/dev/shm
      - ./workspace:/workspace
      - ./huggingface:/root/.cache/huggingface
      # Live-edit SDKs (mounted read-only so the container can't mutate
      # the host tree accidentally).
      - ../cyclo_brain/sdk/zenoh_ros2_sdk:/zenoh_sdk:ro
      - ../cyclo_brain/sdk/robot_client:/robot_client_sdk:ro
      - ../cyclo_brain/sdk/action_chunk_processing:/action_chunk_processing_sdk:ro
      # Common policy runtime shared with LeRobot.
      - ../cyclo_brain/policy/common/runtime:/policy_runtime:ro
      # GR00T keeps backend-local app services, while preserving the image's
      # s6-overlay built-in bundles.
      - ../cyclo_brain/policy/groot/s6-services/main-runtime:/etc/s6-overlay/s6-rc.d/main-runtime:ro
      - ../cyclo_brain/policy/groot/s6-services/engine-process:/etc/s6-overlay/s6-rc.d/engine-process:ro
      - ../cyclo_brain/policy/groot/s6-services/user/contents.d:/etc/s6-overlay/s6-rc.d/user/contents.d:ro
      # Live-edit GR00T engine code.
      - ../cyclo_brain/policy/groot/groot_engine:/app/groot_engine:ro
      - ../cyclo_brain/policy/groot/runtime:/app/runtime:ro
      # zenoh_ros2_sdk message-definition cache. Host-managed (see
      # docker/scripts/init_zenoh_cache.sh) so the in-container SDK
      # doesn't have to git-fetch the upstream `master` branch (gone)
      # and so docker-cp ownership games go away. Two containers share
      # one cache.
      - ./zenoh_cache:/root/.cache/zenoh_ros2_sdk:rw
      # orchestrator keeps the canonical command_topic_list / joint_order
      # YAML. Main runtime's RobotClient reads it on LOAD.
      # Per-robot YAMLs moved to shared/robot_configs/ (consolidated with
      # URDF + meshes under one robot-description tree). The mount destination
      # /orchestrator_config stays because RobotClient reads robot configs
      # from that mount.
      - ../shared/shared/robot_configs:/orchestrator_config:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

    restart: unless-stopped
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
